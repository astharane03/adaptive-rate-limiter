apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: gateway-hpa
  namespace: rate-limiter
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: gateway          # watches the gateway deployment
  minReplicas: 2           # never go below 2 pods
  maxReplicas: 10          # never exceed 10 pods
  metrics:
    # Scale up when average CPU across pods exceeds 70%
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    # Scale up when average memory exceeds 80%
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30    # wait 30s before scaling up again
      policies:
        - type: Pods
          value: 2                       # add max 2 pods at a time
          periodSeconds: 30
    scaleDown:
      stabilizationWindowSeconds: 120   # wait 2 min before scaling down
      policies:
        - type: Pods
          value: 1                       # remove max 1 pod at a time
          periodSeconds: 60