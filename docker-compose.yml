networks:
  ratelimiter-net:
    driver: bridge

volumes:
  redis-data:
  prometheus-data:
  grafana-data:

services:

  # ── Redis ─────────────────────────────────────────────────────
  # Replaces your manual "docker run" command.
  # Start everything with: docker-compose up -d
  redis:
    image: redis:7.2-alpine
    container_name: rl-redis
    command: >
      redis-server
      --save 60 1
      --loglevel warning
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - ratelimiter-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ── Prometheus ─────────────────────────────────────────────────
  # Scrapes /actuator/prometheus every 5s.
  # UI at http://localhost:9091
  # host.docker.internal = your Mac's localhost from inside Docker
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: rl-prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=7d'
      - '--web.enable-lifecycle'
    ports:
      - "9091:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks:
      - ratelimiter-net
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  # ── Grafana ────────────────────────────────────────────────────
  # Dashboards auto-provisioned — no manual setup needed.
  # Open http://localhost:3000  |  Login: admin / admin
  grafana:
    image: grafana/grafana:10.4.0
    container_name: rl-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/datasource.yml:/etc/grafana/provisioning/datasources/datasource.yml:ro
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
    networks:
      - ratelimiter-net
    depends_on:
      - prometheus
    restart: unless-stopped